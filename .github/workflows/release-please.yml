name: release-please

# Maintains a standing release PR (version bump + CHANGELOG) from conventional
# commits. Nothing is released until a maintainer MERGES that PR, which then
# tags a semver release and rotates PIPELINE_VERSION — forcing a full reprocess
# of every dataset on the next run.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use the nde-bot GitHub App token instead of the default GITHUB_TOKEN, so
      # the release PR triggers workflows (QA, auto-merge). PRs opened by the
      # default token are gated behind manual approval and never run CI.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
